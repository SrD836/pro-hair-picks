[build]
  publish = "dist"
  command  = "npm run build"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/logo*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/logo*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[edge_functions]]
  path = "/*"
  function = "inject-meta"

# 301: /categoria/ → /categorias/ (corrección SEO legacy)
[[redirects]]
  from = "/categoria/:slug"
  to = "/categorias/:slug"
  status = 301
  force = true

# SPA redirect: todas las rutas al index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
