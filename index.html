<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guía del Salón — Equipamiento Profesional de Peluquería</title>
    <meta name="description" content="Rankings y comparativas de los mejores productos profesionales para peluquería y barbería en España. Seleccionado por profesionales." />
    <meta name="author" content="GuiaDelSalon.com" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://pro-hair-picks.lovable.app/" />

    <!-- Open Graph -->
    <meta property="og:title" content="GuiaDelSalon.com — Productos Profesionales de Peluquería" />
    <meta property="og:description" content="Rankings actualizados de clippers, trimmers, tijeras y más para profesionales." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pro-hair-picks.lovable.app/" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:site_name" content="GuiaDelSalon.com" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GuiaDelSalon.com — Productos Profesionales de Peluquería" />
    <meta name="twitter:description" content="Rankings actualizados de clippers, trimmers, tijeras y más para profesionales." />

    <!-- Theme color -->
    <meta name="theme-color" content="#1a0a00" />

    <!-- CSS crítico inline: color de fondo del body antes de que cargue el bundle JS -->
    <style>
      :root { --color-espresso: #1a0a00; }
      body { background-color: var(--color-espresso); margin: 0; }
    </style>

    <!-- Preconnect a orígenes críticos -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://hscarzgjltsdronamltt.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://hscarzgjltsdronamltt.supabase.co" />

    <!-- Preload LCP image: la imagen hero se pide en el primer parse del HTML -->
    <link rel="preload" as="image" href="/images/hero-barbershop.webp" type="image/webp" fetchpriority="high" />

    <!-- Fuentes: carga no bloqueante con media swap -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" /></noscript>

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Google Analytics: carga diferida tras window.load + 2s para no bloquear LCP -->
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-M2NB7DFCT1';
          document.head.appendChild(s);
          s.onload = function() {
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'G-M2NB7DFCT1');
          };
        }, 2000);
      });
    </script>

    <!-- Google AdSense: carga diferida con requestIdleCallback o timeout 3s -->
    <script>
      function loadAdsense() {
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5744390861435224';
        s.crossOrigin = 'anonymous';
        document.head.appendChild(s);
      }
      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadAdsense, { timeout: 3000 });
      } else {
        setTimeout(loadAdsense, 3000);
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
