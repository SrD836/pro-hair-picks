<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="Rankings y comparativas de los mejores productos profesionales para peluquería y barbería en España. Seleccionado por profesionales." />
    <meta name="author" content="GuiaDelSalon.com" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://pro-hair-picks.lovable.app/" />

    <!-- Open Graph -->
    <meta property="og:title" content="GuiaDelSalon.com — Productos Profesionales de Peluquería" />
    <meta property="og:description" content="Rankings actualizados de clippers, trimmers, tijeras y más para profesionales." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pro-hair-picks.lovable.app/" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:site_name" content="GuiaDelSalon.com" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GuiaDelSalon.com — Productos Profesionales de Peluquería" />
    <meta name="twitter:description" content="Rankings actualizados de clippers, trimmers, tijeras y más para profesionales." />

    <!-- Theme color -->
    <meta name="theme-color" content="#1a0a00" />

    <!-- CSS crítico inline: fondo y tipografía base antes de que cargue el bundle JS -->
    <style>
      *,*::before,*::after{box-sizing:border-box}
      body{background:#1a0a00;color:#f5f0e8;font-family:Inter,system-ui,sans-serif;margin:0;-webkit-font-smoothing:antialiased}
    </style>

    <!-- Preconnect a orígenes críticos -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://hscarzgjltsdronamltt.supabase.co" crossorigin="anonymous" />
    <link rel="dns-prefetch" href="https://hscarzgjltsdronamltt.supabase.co" />

    <!-- Preload LCP image: descargada en el primer parse del HTML, no espera a React -->
    <link rel="preload" as="image" href="/images/hero-barbershop.webp" type="image/webp" fetchpriority="high" />

    <!-- Fuentes: carga no bloqueante con media swap -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" /></noscript>

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Scripts de terceros: carga diferida por interacción del usuario o 4s de timeout.
         Esto libera ~874ms del hilo principal durante la carga inicial (LCP/TBT).
         GTM/AdSense se cargan igualmente antes del scroll en la mayoría de visitas.
    -->
    <script>
    (function() {
      'use strict';
      var loaded = false;

      function loadThirdParty() {
        if (loaded) return;
        loaded = true;

        // Google Analytics (GA4)
        var ga = document.createElement('script');
        ga.async = true;
        ga.src = 'https://www.googletagmanager.com/gtag/js?id=G-M2NB7DFCT1';
        document.head.appendChild(ga);
        ga.onload = function() {
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', 'G-M2NB7DFCT1');
        };

        // AdSense: 500ms después de GA para no saturar la red en el mismo tick
        setTimeout(function() {
          var ads = document.createElement('script');
          ads.async = true;
          ads.crossOrigin = 'anonymous';
          ads.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5744390861435224';
          document.head.appendChild(ads);
        }, 500);
      }

      // Cargar en la primera interacción del usuario (mousedown, scroll, teclado, touch)
      var events = ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart', 'click'];
      events.forEach(function(e) {
        document.addEventListener(e, loadThirdParty, { once: true, passive: true });
      });

      // Fallback: cargar igualmente a los 4s aunque no haya interacción
      setTimeout(loadThirdParty, 4000);

      // Cargar cuando el tab vuelve a ser visible
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible') loadThirdParty();
      });
    })();
    </script>
  </body>
</html>
