    <!--
      CLOUDFLARE SETTINGS (configurar manualmente en el dashboard):
      - Rocket Loader: OFF  ← CRÍTICO: rompe React SPAs → causa NO_LCP en desktop
      - Auto Minify JS:  OFF (Vite ya lo hace; doble minificación puede romper el bundle)
      - Auto Minify CSS: OFF (mismo motivo)
      - Auto Minify HTML: ON (seguro)
      - Brotli: ON  |  HTTP/2: ON  |  HTTP/3: ON
      - Cache Level: Standard

  <body>
    <div id="root"></div>
    <!-- data-cfasync="false" → Rocket Loader de Cloudflare omite este script -->
    <script type="module" src="/src/main.tsx" data-cfasync="false"></script>

    <!-- Scripts de terceros: carga diferida por scroll/interacción, fallback 5s.
         Libera el hilo principal durante FCP/LCP. -->
    <script>
    (function() {
      'use strict';
      var loaded = false;

      function loadThirdParty() {
        if (loaded) return;
        loaded = true;

        // Google Analytics (GA4)
        var ga = document.createElement('script');
        ga.async = true;
        ga.src = 'https://www.googletagmanager.com/gtag/js?id=G-M2NB7DFCT1';
        document.head.appendChild(ga);
        ga.onload = function() {
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', 'G-M2NB7DFCT1');
        };

        // AdSense: 1s después de GA para no saturar la red en el mismo tick
        setTimeout(function() {
          var ads = document.createElement('script');
          ads.async = true;
          ads.crossOrigin = 'anonymous';
          ads.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5744390861435224';
          document.head.appendChild(ads);
        }, 1000);
      }

      // Trigger 1: primer scroll (señal de usuario activo)
      window.addEventListener('scroll', loadThirdParty, { once: true, passive: true });

      // Trigger 2: primera interacción táctil/click/teclado
      ['click', 'keydown', 'touchstart'].forEach(function(e) {
        document.addEventListener(e, loadThirdParty, { once: true, passive: true });
      });

      // Fallback: 5s sin interacción (captura bots de Google para indexación)
      setTimeout(loadThirdParty, 5000);

      // Tab visible de nuevo tras perder el foco
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible') loadThirdParty();
      });
    })();
    </script>
  </body>
