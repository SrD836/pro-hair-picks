    <!-- AdSense: carga diferida por scroll/interacción, fallback 5s.
         GA4 ahora gestionado por GTM (GTM-5CHKPRNB). -->
    <script>
    (function() {
      'use strict';
      var loaded = false;

      function loadAds() {
        if (loaded) return;
        loaded = true;

        var ads = document.createElement('script');
        ads.async = true;
        ads.crossOrigin = 'anonymous';
        ads.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5744390861435224';
        document.head.appendChild(ads);
      }

      // Trigger 1: primer scroll (señal de usuario activo)
      window.addEventListener('scroll', loadAds, { once: true, passive: true });

      // Trigger 2: primera interacción táctil/click/teclado
      ['click', 'keydown', 'touchstart'].forEach(function(e) {
        document.addEventListener(e, loadAds, { once: true, passive: true });
      });

      // Fallback: 5s sin interacción
      setTimeout(loadAds, 5000);

      // Tab visible de nuevo tras perder el foco
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible') loadAds();
      });
    })();
    </script>
